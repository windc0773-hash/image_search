<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能图片搜索引擎 - 多模态搜索</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --primary-light: #e0e7ff;
  --secondary: #8b5cf6;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --bg-dark: #1e1b4b;
  --bg-card: #ffffff;
  --bg-sec: #f8fafc;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  --radius-sm: 0.5rem;
  --radius: 0.75rem;
  --radius-lg: 1rem;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--bg-dark) 0%, #312e81 100%);
  color: #fff;
  padding: 2rem 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><circle cx="50" cy="50" r="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></svg>') repeat;
  animation: rotate 60s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.header-content {
  position: relative;
  z-index: 1;
}

.header h1 {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.025em;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.header p {
  opacity: 0.9;
  font-size: 1rem;
  margin-bottom: 1.5rem;
}

.header-badges {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
}

.badge {
  background: rgba(255,255,255,0.15);
  padding: 0.375rem 0.875rem;
  border-radius: 9999px;
  font-size: 0.875rem;
  font-weight: 500;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* Container */
.container {
  max-width: 1400px;
  margin: -2rem auto 2rem;
  padding: 0 1.5rem;
  position: relative;
  z-index: 2;
}

/* Card */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  margin-bottom: 1.5rem;
  overflow: hidden;
  transition: var(--transition);
}

.card:hover {
  box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}

.card-header {
  background: linear-gradient(to right, var(--bg-sec), #fff);
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.card-header h3 {
  font-size: 1.125rem;
  color: var(--text-primary);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card-body {
  padding: 1.5rem;
}

/* Search Mode Selector */
.search-mode-selector {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  background: var(--bg-sec);
  padding: 0.5rem;
  border-radius: var(--radius);
  border: 2px solid var(--border);
}

.mode-btn {
  flex: 1;
  padding: 0.75rem 1rem;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  font-size: 0.9375rem;
}

.mode-btn:hover {
  color: var(--primary);
  background: rgba(99, 102, 241, 0.05);
}

.mode-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
}

.mode-icon {
  font-size: 1.25rem;
}

/* Image Upload */
.image-upload-area {
  border: 3px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  background: var(--bg-sec);
  margin-bottom: 1rem;
  display: none;
}

.image-upload-area.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

.image-upload-area:hover, .image-upload-area.dragover {
  border-color: var(--primary);
  background: var(--primary-light);
}

.image-upload-area.uploaded {
  border-style: solid;
  border-color: var(--success);
  background: #d1fae5;
}

.upload-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

.upload-icon {
  font-size: 3rem;
  color: var(--text-muted);
}

.upload-preview {
  max-width: 100%;
  max-height: 200px;
  border-radius: var(--radius);
  display: none;
}

.upload-preview.active {
  display: block;
}

.upload-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1rem;
}

/* Search Bar */
.search-bar {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 280px;
  padding: 1rem 1.25rem;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 1rem;
  outline: none;
  transition: var(--transition);
  background: var(--bg-sec);
  font-family: inherit;
}

.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  background: #fff;
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input.disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 1rem 1.5rem;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  transition: var(--transition);
  font-family: inherit;
  white-space: nowrap;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-sm {
  padding: 0.5rem 1rem;
  font-size: 0.875rem;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
  box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 15px -3px rgba(99, 102, 241, 0.4);
}

.btn-primary:active:not(:disabled) {
  transform: translateY(0);
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--text-primary);
}

.btn-outline:hover:not(:disabled) {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.btn-success {
  background: var(--success);
  color: #fff;
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

/* Form Elements */
.params-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}

.form-group label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 0.75rem 1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9375rem;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
  background: var(--bg-card);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

/* Slider */
.slider-container {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.slider-container input[type="range"] {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  outline: none;
  -webkit-appearance: none;
}

.slider-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(99, 102, 241, 0.3);
}

.slider-value {
  font-weight: 600;
  color: var(--primary);
  min-width: 3rem;
  text-align: right;
}

/* Results */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
}

.result-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
}

.result-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary-light);
}

.result-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: linear-gradient(135deg, var(--bg-sec), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  color: var(--text-muted);
  position: relative;
}

.result-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.result-info {
  padding: 1rem;
  background: var(--bg-card);
  position: relative;
}

.result-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.result-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8125rem;
  color: var(--text-muted);
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 5rem;
  margin-bottom: 1rem;
}

/* Toast */
.toast-container {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.toast {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  border-radius: var(--radius);
  color: #fff;
  font-size: 0.9375rem;
  animation: slideIn 0.3s ease;
  box-shadow: var(--shadow-lg);
  min-width: 300px;
  max-width: 500px;
}

.toast-success {
  background: linear-gradient(135deg, var(--success), #059669);
}

.toast-error {
  background: linear-gradient(135deg, var(--danger), #dc2626);
}

.toast-info {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Action Buttons */
.action-buttons {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

/* Responsive */
@media (max-width: 768px) {
  .search-mode-selector {
    flex-direction: column;
  }
  
  .params-grid {
    grid-template-columns: 1fr;
  }
  
  .result-grid {
    grid-template-columns: 1fr;
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Search Mode Info */
.mode-info {
  background: linear-gradient(135deg, var(--bg-sec), var(--primary-light));
  border: 2px solid var(--primary-light);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.mode-info-icon {
  font-size: 2rem;
}

.mode-info-content h4 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.25rem;
}

.mode-info-content p {
  font-size: 0.875rem;
  color: var(--text-secondary);
}

/* Hidden helper */
.hidden {
  display: none !important;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>🖼️ 智能图片搜索引擎</h1>
    <p>支持文本搜索 · 图像搜索 · 多模态混合搜索</p>
    <div class="header-badges">
      <span class="badge">🔍 智能分词</span>
      <span class="badge">🖼️ 图像搜索</span>
      <span class="badge">🔀 多模态混合</span>
    </div>
  </div>
</div>

<div class="container">

<!-- 搜索模式选择 -->
<div class="card">
  <div class="card-header">
    <h3>🎯 选择搜索模式</h3>
  </div>
  <div class="card-body">
    <div class="search-mode-selector">
      <button class="mode-btn active" onclick="setSearchMode('text')">
        <span class="mode-icon">📝</span>
        <span>文本搜索</span>
      </button>
      <button class="mode-btn" onclick="setSearchMode('image')">
        <span class="mode-icon">🖼️</span>
        <span>图像搜索</span>
      </button>
      <button class="mode-btn" onclick="setSearchMode('hybrid')">
        <span class="mode-icon">🔀</span>
        <span>混合搜索</span>
      </button>
    </div>

    <!-- 模式说明 -->
    <div id="modeInfoText" class="mode-info">
      <div class="mode-info-icon">📝</div>
      <div class="mode-info-content">
        <h4>文本搜索模式</h4>
        <p>使用关键词搜索图片，支持智能分词、同义词扩展和拼写纠错</p>
      </div>
    </div>
  </div>
</div>

<!-- 搜索区域 -->
<div class="card">
  <div class="card-header">
    <h3>🔍 搜索参数</h3>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-outline btn-sm" onclick="resetSearch()">🔄 重置</button>
    </div>
  </div>
  <div class="card-body">
    <!-- 图片上传区域 -->
    <div class="image-upload-area" id="imageUploadArea">
      <div class="upload-placeholder" id="uploadPlaceholder">
        <div class="upload-icon">📤</div>
        <div>
          <p style="font-weight:600;color:var(--text-primary);">拖拽图片到此处</p>
          <p style="font-size:0.875rem;color:var(--text-muted);">或点击选择文件（最大10MB）</p>
        </div>
      </div>
      <img class="upload-preview" id="uploadPreview" alt="上传的图片">
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <div class="upload-actions" id="uploadActions">
        <button class="btn btn-outline btn-sm" onclick="clearUploadedImage()">🗑️ 清除</button>
      </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-bar">
      <input type="text" class="search-input" id="queryInput" placeholder="输入搜索关键词，如：猫咪、风景、人物...">
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">🔍 搜索</button>
    </div>

    <!-- 混合搜索权重调节 -->
    <div id="hybridWeightSection" class="form-group hidden" style="margin-bottom:1.5rem;">
      <label>混合搜索权重调节</label>
      <div class="slider-container">
        <span style="font-size:0.875rem;color:var(--text-secondary);">文本</span>
        <input type="range" id="hybridWeight" min="0" max="100" value="50" oninput="updateWeightDisplay()">
        <span class="slider-value" id="weightDisplay">50%</span>
        <span style="font-size:0.875rem;color:var(--text-secondary);">图像</span>
      </div>
    </div>

    <!-- 基础参数 -->
    <div class="params-grid">
      <div class="form-group">
        <label>每页数量</label>
        <input type="number" id="pageSize" value="20" min="1" max="100">
      </div>
      <div class="form-group">
        <label>排序方式</label>
        <select id="sortOrder">
          <option value="relevance">相关度</option>
          <option value="popularity">热度</option>
          <option value="time">时间</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- 操作按钮 -->
<div class="action-buttons">
  <button class="btn btn-primary" onclick="doSearch()">🔍 执行搜索</button>
</div>

<!-- 结果区域 -->
<div class="card" id="resultCard" style="display:none;">
  <div class="card-header">
    <h3>📋 搜索结果</h3>
    <div class="result-stats" id="resultStats"></div>
  </div>
  <div class="card-body">
    <div id="resultsContainer">
      <div class="result-grid" id="resultGrid"></div>
    </div>
  </div>
</div>

</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API_BASE = '';
let currentMode = 'text';
let uploadedImageData = null;
let uploadedImageVector = null;

// 搜索模式配置
const MODES = {
  text: {
    icon: '📝',
    title: '文本搜索模式',
    description: '使用关键词搜索图片，支持智能分词、同义词扩展和拼写纠错',
    requiresText: true,
    requiresImage: false
  },
  image: {
    icon: '🖼️',
    title: '图像搜索模式',
    description: '上传图片进行以图搜图，基于视觉特征相似度搜索',
    requiresText: false,
    requiresImage: true
  },
  hybrid: {
    icon: '🔀',
    title: '混合搜索模式',
    description: '结合文本和图像特征进行搜索，可调节权重获得最佳效果',
    requiresText: false,
    requiresImage: false
  }
};

// 设置搜索模式
function setSearchMode(mode) {
  currentMode = mode;
  
  // 更新按钮状态
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  event.currentTarget.classList.add('active');
  
  // 更新模式说明
  const config = MODES[mode];
  document.getElementById('modeInfoText').innerHTML = `
    <div class="mode-info-icon">${config.icon}</div>
    <div class="mode-info-content">
      <h4>${config.title}</h4>
      <p>${config.description}</p>
    </div>
  `;
  
  // 更新输入框状态
  const queryInput = document.getElementById('queryInput');
  const uploadArea = document.getElementById('imageUploadArea');
  const weightSection = document.getElementById('hybridWeightSection');
  
  // 文本输入框
  if (config.requiresText) {
    queryInput.classList.remove('disabled');
    queryInput.disabled = false;
    queryInput.placeholder = '输入搜索关键词，如：猫咪、风景、人物...';
  } else if (mode === 'hybrid') {
    queryInput.classList.remove('disabled');
    queryInput.disabled = false;
    queryInput.placeholder = '输入搜索关键词（可选）';
  } else {
    queryInput.classList.add('disabled');
    queryInput.disabled = true;
    queryInput.value = '';
    queryInput.placeholder = '图像搜索模式下不需要输入文本';
  }
  
  // 图片上传区域
  if (config.requiresImage) {
    uploadArea.classList.add('active');
  } else if (mode === 'hybrid') {
    uploadArea.classList.add('active');
  } else {
    uploadArea.classList.remove('active');
  }
  
  // 混合搜索权重
  if (mode === 'hybrid') {
    weightSection.classList.remove('hidden');
  } else {
    weightSection.classList.add('hidden');
  }
}

// 图片上传处理
document.addEventListener('DOMContentLoaded', () => {
  const uploadArea = document.getElementById('imageUploadArea');
  const fileInput = document.getElementById('fileInput');
  
  // 点击上传
  uploadArea.addEventListener('click', () => fileInput.click());
  
  // 文件选择
  fileInput.addEventListener('change', handleFileSelect);
  
  // 拖拽处理
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      handleFile(files[0]);
    }
  });
});

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) {
    handleFile(file);
  }
}

async function handleFile(file) {
  // 检查文件类型
  if (!file.type.startsWith('image/')) {
    toast('请选择图片文件', 'error');
    return;
  }
  
  // 检查文件大小
  if (file.size > 10 * 1024 * 1024) {
    toast('图片大小不能超过10MB', 'error');
    return;
  }
  
  try {
    // 上传图片并获取特征向量
    const formData = new FormData();
    formData.append('file', file);
    
    const response = await fetch(`${API_BASE}/api/v1/images/upload`, {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    
    if (result.code === 0) {
      uploadedImageData = result.data.image_data_uri;
      uploadedImageVector = result.data.vector;
      
      // 显示预览
      const preview = document.getElementById('uploadPreview');
      const placeholder = document.getElementById('uploadPlaceholder');
      const actions = document.getElementById('uploadActions');
      
      preview.src = uploadedImageData;
      preview.classList.add('active');
      placeholder.classList.add('hidden');
      actions.classList.remove('hidden');
      
      document.getElementById('imageUploadArea').classList.add('uploaded');
      
      toast('图片上传成功', 'success');
    } else {
      toast('图片上传失败: ' + result.message, 'error');
    }
  } catch (error) {
    toast('图片上传失败: ' + error.message, 'error');
  }
}

function clearUploadedImage() {
  uploadedImageData = null;
  uploadedImageVector = null;
  
  const preview = document.getElementById('uploadPreview');
  const placeholder = document.getElementById('uploadPlaceholder');
  const actions = document.getElementById('uploadActions');
  
  preview.src = '';
  preview.classList.remove('active');
  placeholder.classList.remove('hidden');
  actions.classList.add('hidden');
  
  document.getElementById('imageUploadArea').classList.remove('uploaded');
  document.getElementById('fileInput').value = '';
  
  toast('图片已清除', 'info');
}

function updateWeightDisplay() {
  const value = document.getElementById('hybridWeight').value;
  document.getElementById('weightDisplay').textContent = value + '%';
}

// 执行搜索
async function doSearch() {
  const mode = MODES[currentMode];
  
  // 验证必填项
  if (mode.requiresText && !document.getElementById('queryInput').value.trim()) {
    toast('请输入搜索关键词', 'error');
    return;
  }
  
  if (mode.requiresImage && !uploadedImageVector) {
    toast('请上传搜索图片', 'error');
    return;
  }
  
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> 搜索中...';
  
  try {
    const startTime = performance.now();
    
    const requestBody = {
      mode: currentMode,
      query: document.getElementById('queryInput').value.trim() || null,
      query_image: uploadedImageData || null,
      page: 1,
      size: parseInt(document.getElementById('pageSize').value) || 20,
      sort: document.getElementById('sortOrder').value,
      highlight: currentMode !== 'image'
    };
    
    // 添加混合搜索权重
    if (currentMode === 'hybrid') {
      requestBody.hybrid_weight = parseInt(document.getElementById('hybridWeight').value) / 100;
    }
    
    const endpoint = currentMode === 'text' 
      ? '/api/v1/images/search'
      : '/api/v1/images/multimodal-search';
    
    const response = await fetch(`${API_BASE}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
    
    const data = await response.json();
    const elapsed = (performance.now() - startTime).toFixed(0);
    
    if (data.code !== 0) {
      toast(data.detail || '搜索失败', 'error');
      return;
    }
    
    const resultData = data.data;
    const total = resultData.total || 0;
    const hits = resultData.hits || [];
    
    // 显示结果
    displayResults(hits, total, elapsed, data.query_info || data.search_mode);
    
  } catch (error) {
    toast('搜索失败: ' + error.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 搜索';
  }
}

function displayResults(hits, total, elapsed, queryInfo) {
  const resultCard = document.getElementById('resultCard');
  const resultGrid = document.getElementById('resultGrid');
  const resultStats = document.getElementById('resultStats');
  
  resultCard.style.display = 'block';
  
  // 统计信息
  let statsHtml = `共 <strong>${total}</strong> 条结果`;
  if (queryInfo) {
    if (typeof queryInfo === 'string') {
      statsHtml += ` · 模式: <strong>${queryInfo}</strong>`;
    } else {
      statsHtml += ` · 模式: <strong>${queryInfo.mode || queryInfo.search_mode}</strong>`;
      if (queryInfo.hybrid_weight !== undefined) {
        statsHtml += ` · 权重: <strong>${(queryInfo.hybrid_weight * 100).toFixed(0)}%</strong>`;
      }
    }
  }
  statsHtml += ` · 耗时 ~${elapsed}ms`;
  resultStats.innerHTML = statsHtml;
  
  // 结果卡片
  if (hits.length === 0) {
    resultGrid.innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1;">
        <div class="icon">🔎</div>
        <h3>没有找到匹配的图片</h3>
        <p>尝试不同的搜索词或上传不同的图片</p>
      </div>`;
    return;
  }
  
  resultGrid.innerHTML = hits.map(hit => {
    const url = hit.url || '';
    const title = hit.title || '无标题';
    const tags = (hit.tags || []).slice(0, 3).map(t => 
      `<span style="background:#f0f0f0;color:#666;padding:2px 8px;border-radius:10px;font-size:0.75rem;">${t}</span>`
    ).join('');
    const score = hit.score || 0;
    
    return `
      <div class="result-card" onclick="showImageDetail('${hit.id}')">
        <div class="result-img">
          ${url ? `<img src="${url}" alt="${title}" onerror="this.parentElement.innerHTML='🖼️'">` : '🖼️'}
        </div>
        <div class="result-info">
          <div class="result-title">${title}</div>
          <div style="margin-bottom:0.5rem;">${tags}</div>
          <div class="result-meta">
            <span>${hit.author || '-'}</span>
            <span>相似度: ${score.toFixed(2)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
  
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
  toast(`搜索完成，找到 ${total} 条结果`, 'success');
}

function showImageDetail(imageId) {
  toast(`查看图片详情: ${imageId}`, 'info');
}

function resetSearch() {
  document.getElementById('queryInput').value = '';
  document.getElementById('pageSize').value = 20;
  document.getElementById('sortOrder').value = 'relevance';
  document.getElementById('hybridWeight').value = 50;
  updateWeightDisplay();
  clearUploadedImage();
  document.getElementById('resultCard').style.display = 'none';
  setSearchMode('text');
  toast('搜索参数已重置', 'info');
}

// Toast 提示
function toast(message, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  el.innerHTML = `<span>${icon}</span><span>${message}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}
</script>
</body>
